var signer = null;
var selectedToken = null;

function log(msg, color) {
  var el = document.getElementById("log");
  el.style.display = "block";
  el.innerHTML += "<div style='margin:3px 0;color:" + (color || "#e8d5b0") + ";'>" + msg + "</div>";
  el.scrollTop = el.scrollHeight;
}

async function getSigner() {
  if (signer) return signer;
  if (!window.ethereum) { throw new Error("No wallet found"); }
  await window.ethereum.request({method:"eth_requestAccounts"});
  try { await window.ethereum.request({method:"wallet_switchEthereumChain",params:[{chainId:"0x89"}]}); } catch(e) { log("Switch to Polygon (137) manually", "#ef4444"); }
  var p = new ethers.BrowserProvider(window.ethereum);
  signer = await p.getSigner();
  log("Wallet: " + await signer.getAddress(), "#4ade80");
  return signer;
}

async function reconnect() {
  var addr = document.getElementById("existingAddr").value.trim();
  if (!addr) { document.getElementById("status").innerText = "Enter contract address"; return; }
  await getSigner();
  contractAddr = addr;
  selectedToken = document.getElementById("tokenSelect").value;
  document.getElementById("contractAddr").innerText = contractAddr;
  document.getElementById("deployedToken").innerText = TOKEN_LABELS[selectedToken];
  document.getElementById("postDeploy").style.display = "block";
  document.getElementById("status").innerHTML = "Reconnected to <span style='color:#c4b5fd;font-family:monospace;'>" + contractAddr + "</span> (" + TOKEN_LABELS[selectedToken] + ")";
  log("Reconnected to " + contractAddr + " (" + TOKEN_LABELS[selectedToken] + ")", "#4ade80");
}

async function deploy() {
  var s = document.getElementById("status");
  var btn = document.getElementById("btnDeploy");
  btn.disabled = true;
  selectedToken = document.getElementById("tokenSelect").value;
  var bytecode = BYTECODES[selectedToken];
  if (!bytecode) { s.innerText = "No bytecode for " + selectedToken; btn.disabled = false; return; }
  try {
    s.innerText = "Connecting wallet...";
    var sig = await getSigner();

    s.innerText = "Deploying PowerUp " + TOKEN_LABELS[selectedToken] + " on Polygon... confirm in wallet";
    log("Deploying PowerUp " + TOKEN_LABELS[selectedToken] + " (no constructor args)");
    var f = new ethers.ContractFactory(ABI, bytecode, sig);
    var c = await f.deploy();
    s.innerText = "Waiting for confirmation...";
    await c.waitForDeployment();
    contractAddr = await c.getAddress();
    log("PowerUp " + TOKEN_LABELS[selectedToken] + " deployed: " + contractAddr, "#4ade80");
    s.innerHTML = "Deployed at <span style='color:#c4b5fd;font-family:monospace;'>" + contractAddr + "</span>";
    document.getElementById("contractAddr").innerText = contractAddr;
    document.getElementById("deployedToken").innerText = TOKEN_LABELS[selectedToken];
    document.getElementById("postDeploy").style.display = "block";
  } catch(e) {
    s.innerHTML = "Error: " + e.message;
    log("Deploy error: " + e.message, "#ef4444");
    btn.disabled = false;
  }
}

async function approveWeth() {
  var s = document.getElementById("status");
  try {
    var sig = await getSigner();
    var amt = document.getElementById("wethAmount").value.trim();
    var wei = ethers.parseEther(amt);
    s.innerText = "Approving " + amt + " WETH for PowerUp contract...";
    log("Approving " + amt + " WETH to " + contractAddr);
    var weth = new ethers.Contract(WETH, ERC20_ABI, sig);
    var tx = await weth.approve(contractAddr, wei);
    s.innerText = "Waiting for approval confirmation...";
    await tx.wait();
    log("WETH approved!", "#4ade80");
    s.innerText = "WETH approved! Now click Power Up.";
  } catch(e) {
    s.innerHTML = "Error: " + e.message;
    log("Approve error: " + e.message, "#ef4444");
  }
}

async function powerUp() {
  var s = document.getElementById("status");
  try {
    var sig = await getSigner();
    var nft = document.getElementById("nftAddr").value.trim();
    var amt = document.getElementById("wethAmount").value.trim();
    if (!nft) { s.innerText = "Enter NFT contract address"; return; }
    var wei = ethers.parseEther(amt);
    s.innerText = "Powering up " + nft + " with " + amt + " WETH (" + TOKEN_LABELS[selectedToken] + ")...";
    log("powerUp(" + nft + ", " + amt + " WETH) via " + TOKEN_LABELS[selectedToken]);
    var c = new ethers.Contract(contractAddr, ABI, sig);
    var tx = await c.powerUp(nft, wei);
    s.innerText = "Waiting for confirmation...";
    var receipt = await tx.wait();
    log("Power-up tx confirmed: " + receipt.hash, "#4ade80");

    // Parse PoweredUp event
    var iface = new ethers.Interface(ABI);
    for (var l of receipt.logs) {
      try {
        var parsed = iface.parseLog({topics: l.topics, data: l.data});
        if (parsed && parsed.name === "PoweredUp") {
          var lpAmt = ethers.formatEther(parsed.args.lpCreated);
          log("LP created: " + lpAmt + " sent to " + parsed.args.nftContract, "#4ade80");
          s.innerHTML = "Done! " + lpAmt + " LP sent to <span style='color:#c4b5fd;font-family:monospace;'>" + parsed.args.nftContract + "</span>";
        }
      } catch(e) {}
    }
  } catch(e) {
    s.innerHTML = "Error: " + e.message;
    log("PowerUp error: " + e.message, "#ef4444");
  }
}
</script>
</body></html>
