<!DOCTYPE html><html><head><title>Deploy Elven PowerUp (Polygon)</title><script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.1/ethers.umd.min.js"></script></head>
<body style="background:#060d08;color:#b0e8c0;font-family:Georgia;padding:30px;text-align:center;max-width:900px;margin:0 auto;">
<h1 style="color:#4ade80;">Elven Power-Up <span style="color:#507760;font-size:16px;">Polygon</span></h1>
<p>WETH &rarr; EGP + JCGWR (trees) &rarr; EGP/JCGWR LP &rarr; sent to NFT contract address</p>
<p style="color:#688;font-size:13px;">No owner, no fees. LP goes directly to the NFT contract to boost backing.</p>

<div style="margin:20px 0;">
  <button onclick="deploy()" id="btnDeploy" style="background:#4ade80;color:#060d08;border:none;padding:14px 30px;font-size:15px;font-weight:bold;border-radius:8px;cursor:pointer;">Deploy on Polygon</button>
</div>

<div style="margin:20px 0;text-align:left;max-width:600px;margin:20px auto;">
  <label style="color:#4ade80;">Or reconnect to existing contract:</label><br>
  <input id="existingAddr" type="text" placeholder="0x..." style="background:#0a1a0e;color:#80d0a0;border:1px solid #4ade8044;padding:10px;font-size:13px;width:100%;margin:5px 0 10px;font-family:monospace;box-sizing:border-box;" />
  <button onclick="reconnect()" style="background:#60a5fa;color:#060d08;border:none;padding:10px 20px;font-size:14px;font-weight:bold;border-radius:8px;cursor:pointer;">Reconnect</button>
</div>

<p id="status" style="margin:20px;color:#4ade80;"></p>

<div id="postDeploy" style="display:none;margin:30px auto;max-width:700px;">
  <h2 style="color:#4ade80;">Elven PowerUp Deployed!</h2>
  <p>Contract: <span id="contractAddr" style="color:#80d0a0;font-family:monospace;"></span></p>
  <hr style="border-color:#4ade8044;">

  <h3 style="color:#4ade80;">Test: Power Up an NFT</h3>
  <div style="text-align:left;">
    <label style="color:#4ade80;">NFT Contract Address (any chain &mdash; LP lands on Polygon at this address):</label><br>
    <input id="nftAddr" type="text" placeholder="0x..." style="background:#0a1a0e;color:#80d0a0;border:1px solid #4ade8044;padding:8px;font-size:13px;width:100%;margin:5px 0 10px;font-family:monospace;box-sizing:border-box;" />
    <label style="color:#4ade80;">WETH Amount:</label><br>
    <input id="wethAmount" type="text" value="0.001" style="background:#0a1a0e;color:#80d0a0;border:1px solid #4ade8044;padding:8px;font-size:13px;width:200px;margin:5px 0 10px;font-family:monospace;" />
  </div>
  <div style="margin:15px 0;">
    <button onclick="approveWeth()" style="background:#4ade80;color:#060d08;border:none;padding:10px 20px;font-size:14px;font-weight:bold;border-radius:8px;cursor:pointer;">1. Approve WETH</button>
    <button onclick="powerUp()" style="background:#60a5fa;color:#060d08;border:none;padding:10px 20px;font-size:14px;font-weight:bold;border-radius:8px;cursor:pointer;margin-left:10px;">2. Power Up!</button>
  </div>
</div>

<div id="log" style="margin:20px 0;padding:15px;background:#0a1a0e;border:1px solid #4ade8044;border-radius:8px;text-align:left;font-family:monospace;font-size:11px;max-height:400px;overflow-y:auto;display:none;"></div>

var ABI = [{"anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"user","type":"address"},{"indexed":true,"internalType":"address","name":"nftContract","type":"address"},{"indexed":false,"internalType":"uint256","name":"wethSpent","type":"uint256"},{"indexed":false,"internalType":"uint256","name":"lpCreated","type":"uint256"}],"name":"PoweredUp","type":"event"},{"inputs":[],"name":"EGP","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"JCGWR","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"WETH","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"nftContract","type":"address"},{"internalType":"uint256","name":"wethAmount","type":"uint256"}],"name":"powerUp","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"router","outputs":[{"internalType":"contract IRouter","name":"","type":"address"}],"stateMutability":"view","type":"function"}];

var ERC20_ABI = [
  {"inputs":[{"name":"spender","type":"address"},{"name":"amount","type":"uint256"}],"name":"approve","outputs":[{"name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},
  {"inputs":[{"name":"owner","type":"address"},{"name":"spender","type":"address"}],"name":"allowance","outputs":[{"name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
  {"inputs":[{"name":"account","type":"address"}],"name":"balanceOf","outputs":[{"name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
  {"inputs":[],"name":"decimals","outputs":[{"name":"","type":"uint8"}],"stateMutability":"view","type":"function"}
];

var contractAddr = null;
var signer = null;

function log(msg, color) {
  var el = document.getElementById("log");
  el.style.display = "block";
  el.innerHTML += "<div style='margin:3px 0;color:" + (color || "#b0e8c0") + ";'>" + msg + "</div>";
  el.scrollTop = el.scrollHeight;
}

async function getSigner() {
  if (signer) return signer;
  if (!window.ethereum) { throw new Error("No wallet found"); }
  await window.ethereum.request({method:"eth_requestAccounts"});
  try { await window.ethereum.request({method:"wallet_switchEthereumChain",params:[{chainId:"0x89"}]}); } catch(e) { log("Switch to Polygon (137) manually", "#ef4444"); }
  var p = new ethers.BrowserProvider(window.ethereum);
  signer = await p.getSigner();
  log("Wallet: " + await signer.getAddress(), "#4ade80");
  return signer;
}

async function reconnect() {
  var addr = document.getElementById("existingAddr").value.trim();
  if (!addr) { document.getElementById("status").innerText = "Enter contract address"; return; }
  await getSigner();
  contractAddr = addr;
  document.getElementById("contractAddr").innerText = contractAddr;
  document.getElementById("postDeploy").style.display = "block";
  document.getElementById("status").innerHTML = "Reconnected to <span style='color:#80d0a0;font-family:monospace;'>" + contractAddr + "</span>";
  log("Reconnected to " + contractAddr, "#4ade80");
}

async function deploy() {
  var s = document.getElementById("status");
  var btn = document.getElementById("btnDeploy");
  btn.disabled = true;
  try {
    s.innerText = "Connecting wallet...";
    var sig = await getSigner();
    s.innerText = "Deploying Elven PowerUp on Polygon... confirm in wallet";
    log("Deploying PowerUpElven (no constructor args)");
    var f = new ethers.ContractFactory(ABI, BYTECODE, sig);
    var c = await f.deploy();
    s.innerText = "Waiting for confirmation...";
    await c.waitForDeployment();
    contractAddr = await c.getAddress();
    log("Elven PowerUp deployed: " + contractAddr, "#4ade80");
    s.innerHTML = "Deployed at <span style='color:#80d0a0;font-family:monospace;'>" + contractAddr + "</span>";
    document.getElementById("contractAddr").innerText = contractAddr;
    document.getElementById("postDeploy").style.display = "block";
  } catch(e) {
    s.innerHTML = "Error: " + e.message;
    log("Deploy error: " + e.message, "#ef4444");
    btn.disabled = false;
  }
}

async function approveWeth() {
  var s = document.getElementById("status");
  try {
    var sig = await getSigner();
    var amt = document.getElementById("wethAmount").value.trim();
    var wei = ethers.parseEther(amt);
    s.innerText = "Approving " + amt + " WETH for Elven PowerUp...";
    log("Approving " + amt + " WETH to " + contractAddr);
    var weth = new ethers.Contract(WETH, ERC20_ABI, sig);
    var tx = await weth.approve(contractAddr, wei);
    s.innerText = "Waiting for approval confirmation...";
    await tx.wait();
    log("WETH approved!", "#4ade80");
    s.innerText = "WETH approved! Now click Power Up.";
  } catch(e) {
    s.innerHTML = "Error: " + e.message;
    log("Approve error: " + e.message, "#ef4444");
  }
}

async function powerUp() {
  var s = document.getElementById("status");
  try {
    var sig = await getSigner();
    var nft = document.getElementById("nftAddr").value.trim();
    var amt = document.getElementById("wethAmount").value.trim();
    if (!nft) { s.innerText = "Enter NFT contract address"; return; }
    var wei = ethers.parseEther(amt);
    s.innerText = "Powering up " + nft + " with " + amt + " WETH...";
    log("powerUp(" + nft + ", " + amt + " WETH)");
    var c = new ethers.Contract(contractAddr, ABI, sig);
    var tx = await c.powerUp(nft, wei);
    s.innerText = "Waiting for confirmation...";
    var receipt = await tx.wait();
    log("Power-up tx confirmed: " + receipt.hash, "#4ade80");
    var iface = new ethers.Interface(ABI);
    for (var l of receipt.logs) {
      try {
        var parsed = iface.parseLog({topics: l.topics, data: l.data});
        if (parsed && parsed.name === "PoweredUp") {
          var lpAmt = ethers.formatEther(parsed.args.lpCreated);
          log("LP created: " + lpAmt + " sent to " + parsed.args.nftContract, "#4ade80");
          s.innerHTML = "Done! " + lpAmt + " EGP/JCGWR LP sent to <span style='color:#80d0a0;font-family:monospace;'>" + parsed.args.nftContract + "</span>";
        }
      } catch(e) {}
    }
  } catch(e) {
    s.innerHTML = "Error: " + e.message;
    log("PowerUp error: " + e.message, "#ef4444");
  }
}
